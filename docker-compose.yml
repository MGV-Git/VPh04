# Nginx (ingress) → Frontend + Backend. PostgreSQL только в сети app (internal).
# pgAdmin и Docker Registry отключены по умолчанию (см. историю репозитория при необходимости вернуть).
# Watchtower: только контейнеры с label com.centurylinklabs.watchtower.enable=true

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=false
    networks:
      - app
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    networks:
      - app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      BEHAVIOR_METRICS_TRUSTED_HOSTS: ${BEHAVIOR_METRICS_TRUSTED_HOSTS:-}
      NGINX_MAIN_SERVER_NAME: ${NGINX_MAIN_SERVER_NAME:-}
      # В compose по умолчанию без Swagger/ReDoc (Nginx тоже отдаёт 404 на эти пути).
      SHOW_API_DOCS: ${SHOW_API_DOCS:-false}
    depends_on:
      postgres:
        condition: service_healthy
    # Порт 8000 только во внутренней сети compose; на хост не пробрасывается.
    expose:
      - "8000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "7"
    labels:
      - com.centurylinklabs.watchtower.enable=true

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    networks:
      - app
    expose:
      - "80"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "5"
    labels:
      - com.centurylinklabs.watchtower.enable=true

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    networks:
      - edge
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      NGINX_MAIN_SERVER_NAME: ${NGINX_MAIN_SERVER_NAME}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "10"
    labels:
      - com.centurylinklabs.watchtower.enable=true

  watchtower:
    image: containrrr/watchtower:1.7.1
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_INCLUDE_RESTARTING: "true"
      WATCHTOWER_ROLLING_RESTART: "true"
      # Современный Docker Engine требует API ≥ 1.40 (часто 1.44+); подставьте `docker version --format '{{.Server.APIVersion}}'`
      DOCKER_API_VERSION: ${DOCKER_API_VERSION:-1.44}
      TZ: ${TZ:-UTC}
    labels:
      - com.centurylinklabs.watchtower.enable=false

networks:
  edge:
    name: itvip_edge
  app:
    name: itvip_app
    internal: true

volumes:
  pgdata:
  nginx_logs:
