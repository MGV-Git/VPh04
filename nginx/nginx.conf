user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;
    sendfile        on;
    keepalive_timeout  65;
    server_tokens off;
    # Длинные server_name (например *.local для сайта + registry)
    server_names_hash_bucket_size 64;
    server_names_hash_max_size 512;

    # Лимиты размера тела (лиды + JSON)
    client_max_body_size 2m;
    client_body_buffer_size 128k;

    # Rate limiting API
    limit_req_zone $binary_remote_addr zone=api_rl:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api_burst:10m rate=30r/s;

    # WAF-lite: подозрительные User-Agent
    map $http_user_agent $bad_ua {
        default 0;
        ~*(?i)(sqlmap|nikto|nmap|masscan|acunetix|nessus|openvas|w3af|dirbuster|gobuster) 1;
    }

    # WAF-lite: типовые паттерны в URI
    map $request_uri $bad_uri {
        default 0;
        ~*(?i)(union.*select|information_schema|benchmark\s*\(|sleep\s*\(|load_file\s*\(|into\s+outfile|\.\./\.\./\.\.) 1;
    }

    map $bad_ua$bad_uri $block_waf {
        default 0;
        "10" 1;
        "01" 1;
        "11" 1;
    }

    include /etc/nginx/conf.d/*.conf;
}
